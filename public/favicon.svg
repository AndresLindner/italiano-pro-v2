<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <clipPath id="circleView">
      <circle cx="256" cy="256" r="240" />
    </clipPath>
    <linearGradient id="glossy" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.5" />
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.1" />
      <stop offset="50.1%" stop-color="#000000" stop-opacity="0.05" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0.2" />
    </linearGradient>
  </defs>
  <g clip-path="url(#circleView)">
    <!-- Green -->
    <rect x="0" y="0" width="170.66" height="512" fill="#008c45" />
    <!-- White -->
    <rect x="170.66" y="0" width="170.66" height="512" fill="#f4f5f0" />
    <!-- Red -->
    <rect x="341.33" y="0" width="170.66" height="512" fill="#cd212a" />
    <!-- Glossy Overlay -->
    <circle cx="256" cy="256" r="240" fill="url(#glossy)" />
  </g>
  <!-- Outer border -->
  <circle cx="256" cy="256" r="244" fill="none" stroke="#e2e8f0" stroke-width="8" />
</svg>